name = "seanhase-api"
main = "src/index.mjs"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"] # mimetext needs node:path/os shims

# Admin SPA static assets (built by admin/build.mjs into worker/public)
[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "seanhase"
database_id = "7803db4b-374e-42fe-a6a0-9ed3180d0fbf"

[triggers]
crons = ["0 15 * * *"] # daily health check (~7am Pacific)

# Custom domains: applied on `wrangler deploy` (auto-creates DNS + certs).
[[routes]]
pattern = "api.seanhase.ca"
custom_domain = true

[[routes]]
pattern = "admin.seanhase.ca"
custom_domain = true

[vars]
SITE_ORIGIN = "https://seanhase.ca"
ADMIN_ORIGIN = "https://admin.seanhase.ca"
GITHUB_REPO = "shanegolden/seanhase.ca"
GITHUB_BRANCH = "main"

# Secrets (set via `wrangler secret put`, never in this file):
#   PEPPER            - password hash pepper
#   GITHUB_PAT        - token with contents:write on GITHUB_REPO
#   RESEND_API_KEY    - optional, unlocks client-facing email

[[send_email]]
name = "MAIL"
